groups:
  - name: raceflow-alerts
    rules:
      - alert: RaceFlowServiceDown
        expr: up{job=~"raceflow-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RaceFlow service {{ $labels.job }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.job }} for at least 1 minute."

      - alert: RaceFlowHighErrorRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count{job=~"raceflow-.*", status=~"5.."}[2m]))
          /
          sum by (job) (rate(http_server_requests_seconds_count{job=~"raceflow-.*"}[2m]))
          > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has sustained a 5xx rate above 5% for 2 minutes."

      - alert: RaceFlowRankingLatencyHigh
        expr: |
          histogram_quantile(0.99, sum(rate(raceflow_ranking_update_duration_seconds_bucket[5m])) by (le)) > 1.0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Ranking update p99 latency exceeds the 1s SLO"
          description: "raceflow-realtime-svc's ranking recomputation p99 has been above 1s for 3 minutes -- protects the product's core SLO (live ranking must feel instant)."
