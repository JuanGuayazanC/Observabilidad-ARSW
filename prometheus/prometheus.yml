global:
  scrape_interval: 5s

rule_files:
  - '/etc/prometheus/raceflow-alerts.yml'

scrape_configs:
  - job_name: 'observability-demo'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

  # RaceFlow (ARSW 2026-1 course project) — the 6 backend microservices,
  # deployed on Azure App Service, scraped directly over HTTPS. Each already
  # exposes Actuator + Micrometer at /actuator/prometheus (same pattern as
  # observability-demo above). See ../raceflow/README.md for the full writeup.
  - job_name: 'raceflow-auth-svc'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['raceflow-auth-svc-etcwe5asgrhtfqad.mexicocentral-01.azurewebsites.net']

  - job_name: 'raceflow-realtime-svc'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['raceflow-realtime-svc-h4fvhydkd2gthheb.mexicocentral-01.azurewebsites.net']

  - job_name: 'raceflow-gateway'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['raceflow-gateway-g8csc0dfh0dxhcax.mexicocentral-01.azurewebsites.net']

  - job_name: 'raceflow-room-svc'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['raceflow-room-svc-aqgybpeffvb0cvbn.mexicocentral-01.azurewebsites.net']

  - job_name: 'raceflow-session-svc'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['raceflow-session-svc-fedte8c0f7frf2dp.mexicocentral-01.azurewebsites.net']

  - job_name: 'raceflow-metrics-svc'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['raceflow-metrics-svc-d9bxepdgbpfnf2fe.mexicocentral-01.azurewebsites.net']
